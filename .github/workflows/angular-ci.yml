name: "CI — Angular Best Practices"
on:
  pull_request:
    branches: [main]
    paths:
      - "angular-best-practices/**"
      - ".github/workflows/angular-ci.yml"
  push:
    branches: [main]
    paths:
      - "angular-best-practices/**"
      - ".github/workflows/angular-ci.yml"
permissions:
  contents: read
concurrency:
  group: angular-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    name: "Build & Test Angular"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: "Checkout del código fuente"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: angular-best-practices/package-lock.json

      - name: "Instalar dependencias (npm ci)"
        working-directory: angular-best-practices
        run: npm ci

      - name: "Lint — Verificar calidad del código"
        working-directory: angular-best-practices
        continue-on-error: true
        run: npx ng lint 2>/dev/null || echo "Linting no configurado — considera agregar ESLint al proyecto"

      - name: "Build — Compilar proyecto Angular"
        working-directory: angular-best-practices
        run: npm run build -- --configuration production

      - name: "Test — Ejecutar pruebas unitarias"
        working-directory: angular-best-practices
        run: npx vitest run --reporter=default --coverage

      - name: "Subir reporte de cobertura"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage-node${{ matrix.node-version }}
          path: angular-best-practices/coverage/
          retention-days: 14