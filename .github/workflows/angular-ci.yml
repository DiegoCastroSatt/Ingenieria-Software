name: "CI - Angular"

on:
  pull_request:
    branches: [main]
    paths:
      - "project-gym/**"
      - ".github/workflows/angular-ci.yml"
  push:
    branches: [main]
    paths:
      - "project-gym/**"
      - ".github/workflows/angular-ci.yml"

permissions:
  contents: read

concurrency:
  group: angular-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: "Build & Test Angular"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: "Checkout del codigo fuente"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: project-gym/package-lock.json

      - name: "Instalar dependencias (npm ci)"
        working-directory: project-gym
        run: npm ci

      - name: "Lint - Verificar calidad del codigo"
        working-directory: project-gym
        continue-on-error: true
        run: npx ng lint 2>/dev/null || echo "Linting no configurado - considera agregar ESLint al proyecto"

      - name: "Build - Compilar proyecto Angular"
        working-directory: project-gym
        run: npm run build -- --configuration production

      - name: "Test - Ejecutar pruebas unitarias"
        working-directory: project-gym
        run: npm test -- --watch=false
