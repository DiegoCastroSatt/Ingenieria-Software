name: "CI - .NET"

on:
  pull_request:
    branches: [main]
    paths:
      - "*.cs"
      - "*.csproj"
      - "**/*.cs"
      - "**/*.csproj"
      - "*.sln"
      - ".github/workflows/dotnet-ci.yml"
  push:
    branches: [main]
    paths:
      - "*.cs"
      - "*.csproj"
      - "**/*.cs"
      - "**/*.csproj"
      - "*.sln"
      - ".github/workflows/dotnet-ci.yml"

permissions:
  contents: read

concurrency:
  group: dotnet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: "Build & Test .NET"
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      BACKEND_PROJECT: Softawer.csproj
      TEST_PROJECT: Softawer.TestRunner/Softawer.TestRunner.csproj
    steps:
      - name: "Checkout del codigo fuente"
        uses: actions/checkout@v4

      - name: "Configurar .NET SDK 8.0"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: "Restaurar dependencias NuGet"
        run: |
          echo "Restaurando paquetes NuGet para el proyecto API..."
          dotnet restore ${{ env.BACKEND_PROJECT }}

          echo "Restaurando paquetes NuGet para el proyecto de Tests..."
          dotnet restore ${{ env.TEST_PROJECT }}

      - name: "Build - Compilar proyecto en modo Release"
        run: |
          echo "Compilando Softawer..."
          dotnet build ${{ env.BACKEND_PROJECT }} \
            --no-restore \
            --configuration Release \
            --warnaserror

          echo "Compilando Softawer.TestRunner..."
          dotnet build ${{ env.TEST_PROJECT }} \
            --no-restore \
            --configuration Release

      - name: "Test - Ejecutar pruebas unitarias"
        run: |
          dotnet test ${{ env.TEST_PROJECT }} \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: "Subir resultados de tests y cobertura"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: |
            **/TestResults/
          retention-days: 14

      - name: "Seguridad - Verificar vulnerabilidades en dependencias"
        continue-on-error: true
        run: |
          echo "Verificando vulnerabilidades en paquetes NuGet..."
          dotnet list ${{ env.BACKEND_PROJECT }} package --vulnerable --include-transitive 2>&1 || true
          dotnet list ${{ env.TEST_PROJECT }} package --vulnerable --include-transitive 2>&1 || true
